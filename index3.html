<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FocusAgenda — HackUNCP</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <h1>FocusAgenda</h1>
    <div class="top-actions">
      <button id="settingsBtn" class="btn">Settings</button>
    </div>
  </header>

  <main class="layout">
    <aside class="left">
      <section class="panel">
        <h2>AI Checklist</h2>
        <div id="checklist" class="accordion open">
          <!-- checklist items populated by JS -->
        </div>
        <div class="panel-actions">
          <button id="regenChecklist" class="btn small">Regenerate</button>
        </div>
      </section>

      <section class="panel">
        <h2>Leaderboard</h2>
        <ul id="leaderboard" class="leaderboard">
          <!-- populated by JS -->
        </ul>
        <div class="panel-actions">
          <button id="joinLeaderboard" class="btn small">Join / Sync</button>
        </div>
      </section>

      <section class="panel">
        <h2>Classes</h2>
        <div style="display:flex;gap:8px;flex-direction:column">
          <input id="className" placeholder="Class name (e.g. CS101)" />
          <input id="classHours" placeholder="Default study hours" type="number" min="0.5" step="0.5" />
          <div style="display:flex;gap:8px;align-items:center">
            <label style="font-size:12px">Start:</label>
            <input id="classStart" type="time" />
            <label style="font-size:12px">Duration (hrs):</label>
            <input id="classDuration" type="number" min="0.25" step="0.25" style="width:80px" />
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding-top:6px">
            <label style="font-size:12px;width:100%">Meeting days:</label>
            <label><input type="checkbox" data-day="0" /> Mon</label>
            <label><input type="checkbox" data-day="1" /> Tue</label>
            <label><input type="checkbox" data-day="2" /> Wed</label>
            <label><input type="checkbox" data-day="3" /> Thu</label>
            <label><input type="checkbox" data-day="4" /> Fri</label>
            <label><input type="checkbox" data-day="5" /> Sat</label>
            <label><input type="checkbox" data-day="6" /> Sun</label>
          </div>
          <div style="display:flex;gap:8px;padding-top:8px">
            <button id="addClassBtn" class="btn small">Add Class</button>
            <button id="clearClasses" class="btn small ghost">Clear</button>
          </div>
        </div>
        <ul id="classesList" class="leaderboard" style="margin-top:8px"></ul>
      </section>
      <section class="panel">
        <h2>History</h2>
        <div id="historyEmpty" style="font-size:12px;color:var(--muted)">Completed assignments will appear here.</div>
        <ul id="historyList" class="leaderboard" style="margin-top:8px"></ul>
        <div class="panel-actions">
          <button id="clearHistory" class="btn small ghost">Clear History</button>
        </div>
      </section>
    </aside>

    <section class="center">
      <div class="panel">
        <h2>Calendar (Study Sessions)</h2>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
          <!-- Only week view remains -->
        </div>
        <canvas id="calendarCanvas" width="900" height="360"></canvas>
        <div class="panel-actions">
          <button id="addStudyBtn" class="btn small">Add Study Block</button>
          <input id="icsFile" type="file" accept=".ics" style="display:none" />
          <button id="importIcsBtn" class="btn small ghost">Import .ics</button>
        </div>
      </div>

      <div class="panel">
        <h2>Syllabus / Generated Plan</h2>
        <pre id="syllabus" class="syllabus">Loading generated syllabus...</pre>
      </div>
      <div class="panel">
        <h2>Events</h2>
        <ul id="eventsList" class="leaderboard"></ul>
        <div class="panel-actions">
          <button id="clearEvents" class="btn small ghost">Clear Events</button>
        </div>
      </div>
    </section>

    <aside class="right">
      <section class="panel chat-panel">
        <h2>Assistant</h2>
        <div id="chatLog" class="chat-log">
          <!-- chat lines -->
        </div>
        <form id="chatForm" class="chat-form">
          <input id="chatInput" placeholder="Ask about upcoming events, add to schedule..." autocomplete="off" />
          <button class="btn" type="submit">Send</button>
        </form>
      </section>
    </aside>
  </main>

  <!-- Settings modal -->
  <div id="settingsModal" class="modal hidden">
    <div class="modal-content">
      <h3>Settings</h3>
      <label>Name: <input id="userName" /></label>
      <label>Focus Points: <input id="userPoints" type="number" min="0" /></label>
      <label>Auto-schedule study blocks: <select id="autoSchedule"><option value="true">On</option><option value="false">Off</option></select></label>
      <div class="modal-actions">
        <button id="saveSettings" class="btn">Save</button>
        <button id="closeSettings" class="btn ghost">Close</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
